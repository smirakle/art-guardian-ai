<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./styles.css?v=2.0.0" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="header">
      <span class="header-title">TSMO Protection</span>
    </div>
    <div class="subtitle-bar">
      <span class="red-dot"></span>
      <span class="beta-label">TSMO Beta</span>
    </div>

    <div class="welcome-section">
      <h2 class="welcome-title">Welcome to TSMO</h2>
      <p class="welcome-desc">Protect your artwork from AI training</p>
    </div>

    <div class="form-group">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Password" />
    </div>

    <div id="login-error" class="error-msg"></div>

    <button id="btn-signin" class="btn btn-signin">Sign In</button>
    <button id="btn-create-account" class="btn btn-create-account">Create Free Account</button>

    <div class="help-link-container">
      <a id="link-help" class="help-link" href="#">Need help?</a>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div id="main-panel" style="display:none;">
    <div class="header">
      <span class="header-title">TSMO Protection</span>
      <button id="btn-logout" class="btn-logout">Logout</button>
    </div>
    <div class="subtitle-bar">
      <span class="red-dot"></span>
      <span class="beta-label">TSMO Beta</span>
      <span id="user-email" class="user-email"></span>
      <span id="user-badge" class="badge badge-basic">Basic</span>
    </div>

    <div class="protect-section">
      <button id="btn-protect" class="btn btn-protect">
        <span class="shield-icon">🛡️</span>
        Protect Current Document
      </button>
      <p class="protect-hint">One click to protect your current document</p>
      <p id="tier-indicator" class="tier-indicator">Basic Protection • Metadata Only</p>
    </div>

    <div id="protection-status" class="status-section" style="display:none;">
      <div id="status-message" class="status-message"></div>
      <div id="post-protect-actions" style="display:none;">
        <button id="btn-save-account" class="btn btn-save-account">💾 Save to TSMO Account</button>
        <button id="btn-view-tsmo" class="btn btn-view-tsmo">🔍 View in TSMO Watch</button>
      </div>
    </div>

    <div class="action-buttons">
      <button id="btn-upgrade" class="btn btn-upgrade">⚡ Upgrade to Pro</button>
      <button id="btn-verify" class="btn btn-verify">✅ Verify Protection</button>
    </div>

    <div id="verify-status" class="verify-status" style="display:none;"></div>
  </div>

  <!-- FOOTER (always visible) -->
  <div class="footer">
    <a id="link-homepage" class="footer-link" href="#">www.tsmowatch.com</a>
    <p class="copyright">© 2026 TSMO Technology Inc.</p>
    <span class="version-badge">v2.0.0</span>
  </div>

  <script src="./index.js?v=2.0.0"></script>
</body>
</html>
