<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSMO Protection</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Login Panel -->
    <div id="loginPanel" class="panel">
      <div class="logo-section">
        <div class="logo">🛡️</div>
        <h1>TSMO Protection</h1>
        <p class="subtitle">AI Training Protection for Creators</p>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" />
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      
      <button id="loginBtn" class="btn btn-primary btn-full">
        Sign In
      </button>
      
      <p class="help-text">
        Don't have an account? <a href="https://tsmo.io/signup" target="_blank">Sign up</a>
      </p>
    </div>

    <!-- Main Panel -->
    <div id="mainPanel" class="panel hidden">
      <div class="header">
        <div class="user-info">
          <span id="userEmail" class="user-email">user@example.com</span>
          <button id="logoutBtn" class="btn btn-small btn-outline">Logout</button>
        </div>
      </div>

      <div class="protection-section">
        <h2>Protection Level</h2>
        <div class="level-selector">
          <label class="level-option">
            <input type="radio" name="level" value="basic" />
            <span class="level-label">
              <strong>Basic</strong>
              <small>XMP + EXIF</small>
            </span>
          </label>
          <label class="level-option selected">
            <input type="radio" name="level" value="professional" checked />
            <span class="level-label">
              <strong>Professional</strong>
              <small>+ Watermark</small>
            </span>
          </label>
          <label class="level-option">
            <input type="radio" name="level" value="enterprise" />
            <span class="level-label">
              <strong>Enterprise</strong>
              <small>+ C2PA</small>
            </span>
          </label>
        </div>
      </div>

      <div class="metadata-section">
        <h2>Copyright Info</h2>
        <div class="form-group">
          <label for="copyrightOwner">Owner Name</label>
          <input type="text" id="copyrightOwner" placeholder="Your Name" />
        </div>
        <div class="form-group">
          <label for="copyrightYear">Year</label>
          <input type="number" id="copyrightYear" value="2025" min="1900" max="2100" />
        </div>
      </div>

      <div class="actions-section">
        <button id="protectBtn" class="btn btn-primary btn-full">
          <span class="icon">🛡️</span>
          Protect Current Document
        </button>
        
        <div class="action-row">
          <button id="batchBtn" class="btn btn-secondary">
            <span class="icon">📚</span>
            Batch
          </button>
          <button id="verifyBtn" class="btn btn-secondary">
            <span class="icon">✓</span>
            Verify
          </button>
        </div>
      </div>

      <div class="settings-section">
        <h2>Settings</h2>
        <label class="toggle-option">
          <input type="checkbox" id="autoProtect" checked />
          <span>Auto-protect on export</span>
        </label>
        <label class="toggle-option">
          <input type="checkbox" id="showNotifications" checked />
          <span>Show notifications</span>
        </label>
      </div>

      <div id="statusSection" class="status-section hidden">
        <div id="statusMessage" class="status-message"></div>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p id="loadingText">Processing...</p>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
