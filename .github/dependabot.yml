version: 2
updates:
  # Monitor npm dependencies for the React frontend
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps"
    # Group minor and patch updates
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
